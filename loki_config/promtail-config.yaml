server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: app_json_logs
  static_configs:
  - targets:
      - localhost
    labels:
      job: app-json-logs
      __path__: /app/logs/*.jsonl
  pipeline_stages:
    - json:
        expressions:
          timestamp: asctime
          logger_name: name
          level: levelname
          message: message
          module: module
          function: funcName
    - labels:
        level: ""
        module: ""
    - timestamp:
        source: timestamp
        format: RFC3339

- job_name: system
  static_configs:
  - targets:
      - localhost
    labels:
      job: varlogs
      __path__: /var/log/*log
